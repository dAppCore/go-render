version: 1

project:
  name: go-html
  description: HTML templating engine
  main: ./cmd/wasm
  binary: core-html-wasm

build:
  cgo: false
  flags:
    - -trimpath
  ldflags:
    - -s
    - -w

targets:
  - os: linux
    arch: amd64
  - os: linux
    arch: arm64
  - os: darwin
    arch: arm64
  - os: windows
    arch: amd64
